<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WiFi Radar — Patient Monitor</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #232a2e; color: #d3c6aa; font-family: 'Inter', -apple-system, sans-serif; overflow-y: auto; min-height: 100vh; }

.app { max-width: 960px; margin: 0 auto; padding: 16px 20px; }

/* Header */
.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 16px; margin-bottom: 16px;
  background: #2d353b; border-radius: 12px;
  border: 1px solid #343f44;
}
.logo { display: flex; align-items: center; gap: 10px; }
.logo-icon { width: 32px; height: 32px; border-radius: 8px; background: linear-gradient(135deg, #7fbbb3, #a7c080); display: flex; align-items: center; justify-content: center; font-size: 14px; color: #232a2e; font-weight: 700; }
.logo-text { font-size: 16px; font-weight: 600; }
.logo-sub { font-size: 12px; color: #859289; margin-left: 4px; }
.header-right { display: flex; align-items: center; gap: 14px; }
.badge { display: flex; align-items: center; gap: 5px; padding: 3px 10px; border-radius: 4px; background: rgba(167,192,128,0.08); border: 1px solid rgba(167,192,128,0.15); }
.badge .dot { width: 6px; height: 6px; border-radius: 50%; background: #a7c080; animation: pulse 2s ease-in-out infinite; }
.badge .text { font-size: 10px; font-weight: 500; color: #a7c080; font-family: 'JetBrains Mono'; }
@keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.4} }
.ws-status { display: flex; align-items: center; gap: 6px; }
.ws-dot { width: 8px; height: 8px; border-radius: 50%; }
.ws-dot.live { background: #a7c080; box-shadow: 0 0 8px #a7c08066; }
.ws-dot.off { background: #e67e80; box-shadow: 0 0 8px #e67e8066; }
.ws-label { font-size: 12px; font-weight: 500; }
.fps-label { font-family: 'JetBrains Mono'; font-size: 11px; color: #7a8478; }

/* Status Card — big hero */
.status-card {
  background: #2d353b; border-radius: 16px; padding: 32px;
  margin-bottom: 16px; text-align: center;
  border: 1px solid #343f44;
  transition: border-color 0.5s;
}
.status-icon {
  width: 80px; height: 80px; border-radius: 20px; margin: 0 auto 16px;
  display: flex; align-items: center; justify-content: center;
  font-size: 36px; transition: all 0.5s;
  border: 2px solid transparent;
}
.status-icon.absent   { background: rgba(127,187,179,0.08); color: #7fbbb3; border-color: rgba(127,187,179,0.25); }
.status-icon.lying    { background: rgba(214,153,182,0.08); color: #d699b6; border-color: rgba(214,153,182,0.25); }
.status-icon.sitting  { background: rgba(167,192,128,0.08); color: #a7c080; border-color: rgba(167,192,128,0.25); }
.status-icon.walking  { background: rgba(219,188,127,0.08); color: #dbbc7f; border-color: rgba(219,188,127,0.25); }
.status-name {
  font-size: 28px; font-weight: 700; margin-bottom: 8px;
  transition: color 0.4s;
}
.status-name.absent  { color: #7fbbb3; }
.status-name.lying   { color: #d699b6; }
.status-name.sitting { color: #a7c080; }
.status-name.walking { color: #dbbc7f; }

.conf-bar { max-width: 320px; margin: 0 auto 12px; display: flex; align-items: center; gap: 10px; }
.conf-track { flex: 1; height: 8px; background: #343f44; border-radius: 4px; overflow: hidden; }
.conf-fill { height: 100%; border-radius: 4px; transition: width 0.4s, background 0.4s; }
.conf-pct { font-family: 'JetBrains Mono'; font-size: 14px; font-weight: 600; min-width: 42px; }
.status-duration { font-size: 13px; color: #859289; }
.status-duration span { color: #d3c6aa; font-weight: 500; }

/* Alert banner */
.alert-banner {
  display: none; margin-bottom: 16px; padding: 10px 16px;
  background: rgba(230,126,128,0.08); border: 1px solid rgba(230,126,128,0.2);
  border-radius: 10px; color: #e67e80; font-size: 13px; font-weight: 500;
  text-align: center;
}
.alert-banner.visible { display: block; }

/* Activity stats */
.stats-row {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
  margin-bottom: 16px;
}
.stat-card {
  background: #2d353b; border-radius: 12px; padding: 14px 12px;
  text-align: center; border: 1px solid #343f44;
  transition: border-color 0.3s;
}
.stat-card.active { border-color: rgba(211,198,170,0.2); }
.stat-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px; }
.stat-label.absent  { color: #7fbbb3; }
.stat-label.lying   { color: #d699b6; }
.stat-label.sitting { color: #a7c080; }
.stat-label.walking { color: #dbbc7f; }
.stat-time { font-family: 'JetBrains Mono'; font-size: 18px; font-weight: 600; color: #d3c6aa; margin-bottom: 6px; }
.stat-bar-bg { height: 4px; background: #343f44; border-radius: 2px; overflow: hidden; }
.stat-bar-fill { height: 100%; border-radius: 2px; transition: width 0.5s; }
.stat-bar-fill.absent  { background: #7fbbb3; }
.stat-bar-fill.lying   { background: #d699b6; }
.stat-bar-fill.sitting { background: #a7c080; }
.stat-bar-fill.walking { background: #dbbc7f; }

/* Recalibrate button */
.recal-btn {
  padding: 8px 16px; border-radius: 8px; border: 1px solid #475258;
  background: #343f44; color: #d3c6aa; font-size: 12px; font-weight: 500;
  cursor: pointer; transition: all 0.2s; font-family: 'Inter', sans-serif;
}
.recal-btn:hover { background: #3d484d; border-color: #7fbbb3; color: #7fbbb3; }
.recal-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.recal-btn.active { background: rgba(127,187,179,0.1); border-color: #7fbbb3; color: #7fbbb3; }
.recal-bar { height: 3px; background: #343f44; border-radius: 2px; margin-top: 6px; overflow: hidden; display: none; }
.recal-bar.visible { display: block; }
.recal-bar-fill { height: 100%; background: #7fbbb3; border-radius: 2px; transition: width 0.3s; width: 0; }

/* Panels */
.panel {
  background: #2d353b; border-radius: 12px; padding: 14px 16px;
  margin-bottom: 12px; border: 1px solid #343f44;
}
.panel-title {
  font-size: 10px; font-weight: 600; text-transform: uppercase;
  letter-spacing: 1px; color: #7a8478; margin-bottom: 10px;
}

/* Timeline */
#timelineCanvas { width: 100%; height: 80px; display: block; border-radius: 8px; background: #343f44; }

/* Motion sparkline */
#motionCanvas { width: 100%; height: 50px; display: block; border-radius: 8px; background: #343f44; }

/* Nodes */
.nodes-row { display: flex; gap: 12px; }
.node-item { flex: 1; display: flex; align-items: center; gap: 8px; }
.node-id {
  width: 24px; height: 24px; border-radius: 6px; display: flex;
  align-items: center; justify-content: center;
  font-family: 'JetBrains Mono'; font-size: 10px; font-weight: 600; color: #232a2e;
}
.node-id.n1 { background: #7fbbb3; }
.node-id.n2 { background: #d699b6; }
.node-id.n3 { background: #dbbc7f; }
.node-bar-bg { flex: 1; height: 6px; background: #343f44; border-radius: 3px; overflow: hidden; }
.node-bar-fill { height: 100%; border-radius: 3px; transition: width 0.3s; }
.node-bar-fill.n1 { background: #7fbbb3; }
.node-bar-fill.n2 { background: #d699b6; }
.node-bar-fill.n3 { background: #dbbc7f; }
.node-val { font-family: 'JetBrains Mono'; font-size: 11px; color: #859289; width: 30px; text-align: right; }

/* Recent changes log */
.changes-list { max-height: 120px; overflow-y: auto; }
.change-item {
  display: flex; align-items: center; gap: 8px;
  padding: 5px 0; border-bottom: 1px solid #343f4444;
  font-size: 12px;
}
.change-item:last-child { border-bottom: none; }
.change-time { font-family: 'JetBrains Mono'; font-size: 11px; color: #7a8478; min-width: 50px; }
.change-from, .change-to { font-weight: 500; }
.change-arrow { color: #7a8478; }
.changes-list::-webkit-scrollbar { width: 3px; }
.changes-list::-webkit-scrollbar-track { background: transparent; }
.changes-list::-webkit-scrollbar-thumb { background: #475258; border-radius: 2px; }

/* Bottom grid */
.bottom-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
@media (max-width: 700px) {
  .stats-row { grid-template-columns: repeat(2, 1fr); }
  .bottom-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div class="app">
  <!-- Header -->
  <div class="header">
    <div class="logo">
      <div class="logo-icon">W</div>
      <span class="logo-text">WiFi Radar</span>
      <span class="logo-sub">Patient Monitor</span>
    </div>
    <div class="header-right">
      <button class="recal-btn" id="recalBtn" onclick="startRecalibration()">Recalibrate</button>
      <div class="badge"><div class="dot"></div><span class="text">CSINetLight</span></div>
      <span class="fps-label" id="fps">-- fps</span>
      <div class="ws-status">
        <span class="ws-dot off" id="wsDot"></span>
        <span class="ws-label" id="wsLabel">Connecting</span>
      </div>
    </div>
  </div>

  <!-- Alert -->
  <div class="alert-banner" id="alertBanner"></div>
  <!-- Recalibration progress -->
  <div class="recal-bar" id="recalBar"><div class="recal-bar-fill" id="recalFill"></div></div>

  <!-- Big status -->
  <div class="status-card" id="statusCard">
    <div class="status-icon absent" id="statusIcon">--</div>
    <div class="status-name absent" id="statusName">Initializing</div>
    <div class="conf-bar">
      <div class="conf-track"><div class="conf-fill" id="confFill" style="width:0;background:#7fbbb3"></div></div>
      <span class="conf-pct" id="confPct" style="color:#7fbbb3">0%</span>
    </div>
    <div class="status-duration" id="statusDuration">Waiting for data...</div>
  </div>

  <!-- Activity stats -->
  <div class="stats-row">
    <div class="stat-card" id="statEmpty">
      <div class="stat-label absent">Empty</div>
      <div class="stat-time" id="timeEmpty">0:00</div>
      <div class="stat-bar-bg"><div class="stat-bar-fill absent" id="barEmpty" style="width:0"></div></div>
    </div>
    <div class="stat-card" id="statLying">
      <div class="stat-label lying">Lying</div>
      <div class="stat-time" id="timeLying">0:00</div>
      <div class="stat-bar-bg"><div class="stat-bar-fill lying" id="barLying" style="width:0"></div></div>
    </div>
    <div class="stat-card" id="statSitting">
      <div class="stat-label sitting">Sitting</div>
      <div class="stat-time" id="timeSitting">0:00</div>
      <div class="stat-bar-bg"><div class="stat-bar-fill sitting" id="barSitting" style="width:0"></div></div>
    </div>
    <div class="stat-card" id="statWalking">
      <div class="stat-label walking">Walking</div>
      <div class="stat-time" id="timeWalking">0:00</div>
      <div class="stat-bar-bg"><div class="stat-bar-fill walking" id="barWalking" style="width:0"></div></div>
    </div>
  </div>

  <!-- Timeline -->
  <div class="panel">
    <div class="panel-title">Activity Timeline</div>
    <canvas id="timelineCanvas"></canvas>
  </div>

  <!-- Bottom: motion + nodes + changes -->
  <div class="bottom-grid">
    <div>
      <div class="panel">
        <div class="panel-title">Motion Energy</div>
        <canvas id="motionCanvas"></canvas>
      </div>
      <div class="panel">
        <div class="panel-title">Sensor Nodes</div>
        <div class="nodes-row">
          <div class="node-item"><div class="node-id n1">1</div><div class="node-bar-bg"><div class="node-bar-fill n1" id="nb1" style="width:0"></div></div><span class="node-val" id="nv1">0.0</span></div>
          <div class="node-item"><div class="node-id n2">2</div><div class="node-bar-bg"><div class="node-bar-fill n2" id="nb2" style="width:0"></div></div><span class="node-val" id="nv2">0.0</span></div>
          <div class="node-item"><div class="node-id n3">3</div><div class="node-bar-bg"><div class="node-bar-fill n3" id="nb3" style="width:0"></div></div><span class="node-val" id="nv3">0.0</span></div>
        </div>
      </div>
    </div>
    <div class="panel">
      <div class="panel-title">State Changes</div>
      <div class="changes-list" id="changesList">
        <div style="color:#7a8478;font-size:12px;padding:8px 0">No changes yet</div>
      </div>
    </div>
  </div>
</div>

<script>
const WS_URL = (() => {
  const h = location.hostname || 'localhost';
  const p = (location.port === '3030' || location.port === '') ? 3031 : 4001;
  return 'ws://' + h + ':' + p + '/ws/sensing';
})();

const classConfig = {
  absent:  { fg: '#7fbbb3', label: 'Room Empty', icon: '\u2014',  key: 'absent',  statId: 'Empty' },
  lying_still:  { fg: '#d699b6', label: 'Lying Down', icon: '\u23E4', key: 'lying',   statId: 'Lying' },
  present_still:{ fg: '#a7c080', label: 'Sitting',    icon: '\u25CF', key: 'sitting', statId: 'Sitting' },
  present_moving:{fg: '#dbbc7f', label: 'Walking',    icon: '\u2192', key: 'walking', statId: 'Walking' },
  active:       { fg: '#e67e80', label: 'Active',     icon: '\u26A1', key: 'walking', statId: 'Walking' },
};

// State tracking
let currentClass = 'absent';
let stateStartTime = Date.now();
const stateDurations = { absent: 0, lying: 0, sitting: 0, walking: 0 };
let smoothedConf = 0;

// Motion energy tracking
const nodeMotion = [0, 0, 0];
const nodeMotionSmooth = [0, 0, 0];
const prevAmps = [null, null, null];
const MOTION_HISTORY_MAX = 200;
const motionHistory = [];

// Timeline
const TIMELINE_MAX = 400;
const timelineData = [];

// State changes log
const stateChanges = [];
const MAX_CHANGES = 20;

// Alert thresholds (seconds)
const ALERT_LYING = 4 * 3600;   // 4 hours
const ALERT_SITTING = 2 * 3600; // 2 hours
const ALERT_ABSENT = 30 * 60;   // 30 minutes no presence

// FPS tracking
let frameCount = 0, lastFpsTime = Date.now();

function getStateKey(motionLevel) {
  const cc = classConfig[motionLevel];
  return cc ? cc.key : 'absent';
}

function formatDuration(ms) {
  const totalSec = Math.floor(ms / 1000);
  const h = Math.floor(totalSec / 3600);
  const m = Math.floor((totalSec % 3600) / 60);
  const s = totalSec % 60;
  if (h > 0) return h + ':' + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
  return m + ':' + String(s).padStart(2,'0');
}

function formatTime(ts) {
  const d = new Date(ts);
  return String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
}

function processMessage(d) {
  // Node data
  if (d.nodes && Array.isArray(d.nodes)) {
    for (const node of d.nodes) {
      const nid = node.node_id, amps = node.amplitude;
      if (!amps || nid < 1 || nid > 3) continue;
      const idx = nid - 1;
      if (prevAmps[idx]) {
        const n = Math.min(prevAmps[idx].length, amps.length);
        let diff = 0;
        for (let i = 0; i < n; i++) diff += (amps[i] - prevAmps[idx][i]) ** 2;
        const raw = diff / (n || 1);
        nodeMotion[idx] = nodeMotion[idx] * 0.6 + raw * 0.4;
        if (raw > nodeMotionSmooth[idx]) nodeMotionSmooth[idx] = nodeMotionSmooth[idx] * 0.5 + raw * 0.5;
        else nodeMotionSmooth[idx] = nodeMotionSmooth[idx] * 0.4 + raw * 0.6;
      }
      prevAmps[idx] = amps.slice();
    }
    // Overall motion energy
    const avgMotion = (nodeMotionSmooth[0] + nodeMotionSmooth[1] + nodeMotionSmooth[2]) / 3;
    motionHistory.push(avgMotion);
    if (motionHistory.length > MOTION_HISTORY_MAX) motionHistory.shift();
  }

  // Classification
  if (d.classification) {
    const cls = d.classification.motion_level;
    const conf = d.classification.confidence || 0;
    smoothedConf = conf;

    const newKey = getStateKey(cls);
    const oldKey = getStateKey(currentClass);

    if (newKey !== oldKey) {
      // State changed — accumulate time for previous state
      const elapsed = Date.now() - stateStartTime;
      stateDurations[oldKey] += elapsed;
      stateStartTime = Date.now();

      // Log change
      stateChanges.unshift({
        time: Date.now(),
        from: oldKey,
        to: newKey,
      });
      if (stateChanges.length > MAX_CHANGES) stateChanges.pop();
    }
    currentClass = cls;

    // Timeline
    timelineData.push({ time: Date.now(), cls: cls, conf: conf });
    if (timelineData.length > TIMELINE_MAX) timelineData.shift();
  }
}

function updateStatus() {
  const cc = classConfig[currentClass] || classConfig.absent;
  const key = cc.key;

  // Icon
  const icon = document.getElementById('statusIcon');
  icon.className = 'status-icon ' + key;
  icon.textContent = cc.icon;

  // Name
  const name = document.getElementById('statusName');
  name.className = 'status-name ' + key;
  name.textContent = cc.label;

  // Confidence
  const pct = (smoothedConf * 100).toFixed(0);
  document.getElementById('confPct').textContent = pct + '%';
  document.getElementById('confPct').style.color = cc.fg;
  document.getElementById('confFill').style.width = pct + '%';
  document.getElementById('confFill').style.background = cc.fg;

  // Duration in current state
  const elapsed = Date.now() - stateStartTime;
  const totalForState = stateDurations[key] + elapsed;
  document.getElementById('statusDuration').innerHTML =
    'In current state for <span>' + formatDuration(elapsed) + '</span>';

  // Status card border hint
  document.getElementById('statusCard').style.borderColor = cc.fg + '30';

  // Stat cards
  const allDurations = { ...stateDurations };
  allDurations[key] += elapsed;
  const maxDur = Math.max(1, ...Object.values(allDurations));

  const stateToId = { absent: 'Empty', lying: 'Lying', sitting: 'Sitting', walking: 'Walking' };
  for (const [k, dur] of Object.entries(allDurations)) {
    const id = stateToId[k] || k;
    document.getElementById('time' + id).textContent = formatDuration(dur);
    document.getElementById('bar' + id).style.width = (dur / maxDur * 100) + '%';
    const card = document.getElementById('stat' + id);
    card.className = 'stat-card' + (k === key ? ' active' : '');
  }

  // Node bars
  const maxM = Math.max(0.5, ...nodeMotionSmooth);
  for (let i = 0; i < 3; i++) {
    document.getElementById('nb' + (i + 1)).style.width = Math.min(100, (nodeMotionSmooth[i] / maxM) * 100) + '%';
    document.getElementById('nv' + (i + 1)).textContent = nodeMotion[i].toFixed(1);
  }

  // State changes log
  const list = document.getElementById('changesList');
  if (stateChanges.length === 0) {
    list.innerHTML = '<div style="color:#7a8478;font-size:12px;padding:8px 0">No changes yet</div>';
  } else {
    list.innerHTML = stateChanges.map(c => {
      const fromCfg = classConfig[Object.keys(classConfig).find(k => classConfig[k].key === c.from)] || classConfig.absent;
      const toCfg = classConfig[Object.keys(classConfig).find(k => classConfig[k].key === c.to)] || classConfig.absent;
      return `<div class="change-item">
        <span class="change-time">${formatTime(c.time)}</span>
        <span class="change-from" style="color:${fromCfg.fg}">${c.from}</span>
        <span class="change-arrow">\u2192</span>
        <span class="change-to" style="color:${toCfg.fg}">${c.to}</span>
      </div>`;
    }).join('');
  }

  // Alert check
  const banner = document.getElementById('alertBanner');
  const currentDur = Date.now() - stateStartTime;
  const durSec = currentDur / 1000;
  if (key === 'lying' && durSec > ALERT_LYING) {
    banner.textContent = '\u26A0 Extended lying detected (' + formatDuration(currentDur) + '). Consider checking on patient.';
    banner.className = 'alert-banner visible';
  } else if (key === 'sitting' && durSec > ALERT_SITTING) {
    banner.textContent = '\u26A0 Extended sitting detected (' + formatDuration(currentDur) + '). Consider encouraging movement.';
    banner.className = 'alert-banner visible';
  } else if (key === 'absent' && durSec > ALERT_ABSENT) {
    banner.textContent = '\u26A0 No presence detected for ' + formatDuration(currentDur) + '.';
    banner.className = 'alert-banner visible';
  } else {
    banner.className = 'alert-banner';
  }
}

// ── Canvas drawing ──

const tlCanvas = document.getElementById('timelineCanvas');
const tlCtx = tlCanvas.getContext('2d');
const motCanvas = document.getElementById('motionCanvas');
const motCtx = motCanvas.getContext('2d');

function resizeCanvases() {
  const dpr = devicePixelRatio || 1;
  [tlCanvas, motCanvas].forEach(c => {
    const r = c.parentElement.getBoundingClientRect();
    c.width = Math.round(r.width * dpr);
    c.height = Math.round(r.height * dpr);
  });
}
window.addEventListener('resize', resizeCanvases);
setTimeout(resizeCanvases, 50); resizeCanvases();

const tlClassY = {
  absent: 0.1, lying_still: 0.3, present_still: 0.55, present_moving: 0.75, active: 0.9
};
const tlLabels = [
  { t: 'empty', y: 0.1 }, { t: 'lying', y: 0.3 },
  { t: 'sitting', y: 0.55 }, { t: 'walking', y: 0.75 },
];

function drawTimeline() {
  const dpr = devicePixelRatio || 1;
  const W = tlCanvas.width, H = tlCanvas.height;
  tlCtx.fillStyle = '#343f44'; tlCtx.fillRect(0, 0, W, H);
  if (timelineData.length < 2) return;

  const colW = W / TIMELINE_MAX;

  // Color bands
  for (let i = 0; i < timelineData.length; i++) {
    const d = timelineData[i];
    const cc = classConfig[d.cls] || classConfig.absent;
    const x = (TIMELINE_MAX - timelineData.length + i) * colW;
    const y_ratio = tlClassY[d.cls] || 0.5;
    tlCtx.fillStyle = cc.fg + '25';
    tlCtx.fillRect(x, H - y_ratio * H, colW + 0.5, y_ratio * H);
  }

  // Line
  tlCtx.strokeStyle = '#d3c6aa55'; tlCtx.lineWidth = 1.5 * dpr; tlCtx.beginPath();
  for (let i = 0; i < timelineData.length; i++) {
    const d = timelineData[i];
    const cc = classConfig[d.cls] || classConfig.absent;
    const x = (TIMELINE_MAX - timelineData.length + i) * colW + colW / 2;
    const y = H - (tlClassY[d.cls] || 0.5) * H;
    i === 0 ? tlCtx.moveTo(x, y) : tlCtx.lineTo(x, y);
  }
  tlCtx.stroke();

  // Labels
  const fs = Math.max(8, Math.min(11, H / 16));
  tlCtx.fillStyle = '#7a847844'; tlCtx.font = `${fs * dpr}px 'JetBrains Mono'`;
  tlCtx.textAlign = 'right';
  tlLabels.forEach(l => tlCtx.fillText(l.t, W - 4 * dpr, H - l.y * H + 3 * dpr));
}

function drawMotion() {
  const dpr = devicePixelRatio || 1;
  const W = motCanvas.width, H = motCanvas.height;
  motCtx.fillStyle = '#343f44'; motCtx.fillRect(0, 0, W, H);
  if (motionHistory.length < 2) return;

  const maxV = Math.max(0.1, ...motionHistory);
  const colW = W / MOTION_HISTORY_MAX;

  // Gradient fill under the curve
  const grad = motCtx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, 'rgba(167,192,128,0.3)');
  grad.addColorStop(1, 'rgba(167,192,128,0.02)');

  motCtx.beginPath();
  motCtx.moveTo(0, H);
  for (let i = 0; i < motionHistory.length; i++) {
    const x = (MOTION_HISTORY_MAX - motionHistory.length + i) * colW;
    const y = H - (motionHistory[i] / maxV) * H * 0.9;
    motCtx.lineTo(x, y);
  }
  motCtx.lineTo(W, H);
  motCtx.fillStyle = grad;
  motCtx.fill();

  // Line
  motCtx.beginPath();
  for (let i = 0; i < motionHistory.length; i++) {
    const x = (MOTION_HISTORY_MAX - motionHistory.length + i) * colW;
    const y = H - (motionHistory[i] / maxV) * H * 0.9;
    i === 0 ? motCtx.moveTo(x, y) : motCtx.lineTo(x, y);
  }
  motCtx.strokeStyle = '#a7c080'; motCtx.lineWidth = 1.5 * dpr;
  motCtx.stroke();
}

// ── Render loop ──
let lastRender = 0;
function render(ts) {
  if (ts - lastRender > 80) {
    lastRender = ts;
    updateStatus();
    drawTimeline();
    drawMotion();
  }
  requestAnimationFrame(render);
}
requestAnimationFrame(render);

// ── Recalibration ──
const RECAL_API = (() => {
  const h = location.hostname || 'localhost';
  const p = location.port || '3030';
  return 'http://' + h + ':' + p;
})();

let recalPolling = false;

function startRecalibration() {
  const btn = document.getElementById('recalBtn');
  btn.disabled = true;
  btn.textContent = 'Starting...';

  fetch(RECAL_API + '/api/v1/recalibrate', { method: 'POST' })
    .then(r => r.json())
    .then(d => {
      if (d.status === 'started' || d.status === 'already_running') {
        btn.className = 'recal-btn active';
        btn.textContent = 'Calibrating...';
        document.getElementById('recalBar').className = 'recal-bar visible';
        document.getElementById('alertBanner').textContent = 'Calibrating baseline — keep room EMPTY for ~25 seconds';
        document.getElementById('alertBanner').className = 'alert-banner visible';
        if (!recalPolling) pollRecalStatus();
      } else {
        btn.disabled = false;
        btn.textContent = 'Recalibrate';
        alert(d.message || 'Error');
      }
    })
    .catch(e => {
      btn.disabled = false;
      btn.textContent = 'Recalibrate';
    });
}

function pollRecalStatus() {
  recalPolling = true;
  fetch(RECAL_API + '/api/v1/recalibrate/status')
    .then(r => r.json())
    .then(d => {
      const pct = d.total > 0 ? (d.progress / d.total * 100) : 0;
      document.getElementById('recalFill').style.width = pct + '%';

      if (d.active) {
        document.getElementById('recalBtn').textContent =
          'Calibrating ' + Math.round(pct) + '%';
        setTimeout(pollRecalStatus, 500);
      } else {
        // Done
        recalPolling = false;
        const btn = document.getElementById('recalBtn');
        btn.disabled = false;
        btn.className = 'recal-btn';
        btn.textContent = 'Recalibrate';
        document.getElementById('recalBar').className = 'recal-bar';
        document.getElementById('alertBanner').textContent = 'Baseline recalibrated successfully!';
        setTimeout(() => {
          document.getElementById('alertBanner').className = 'alert-banner';
        }, 5000);
      }
    })
    .catch(() => {
      recalPolling = false;
      document.getElementById('recalBtn').disabled = false;
      document.getElementById('recalBtn').textContent = 'Recalibrate';
    });
}

// ── WebSocket ──
function connect() {
  const ws = new WebSocket(WS_URL);
  ws.onopen = () => {
    document.getElementById('wsDot').className = 'ws-dot live';
    document.getElementById('wsLabel').textContent = 'Live';
    document.getElementById('wsLabel').style.color = '#a7c080';
  };
  ws.onclose = () => {
    document.getElementById('wsDot').className = 'ws-dot off';
    document.getElementById('wsLabel').textContent = 'Offline';
    document.getElementById('wsLabel').style.color = '#e67e80';
    setTimeout(connect, 2000);
  };
  ws.onerror = () => ws.close();
  let lastP = 0;
  ws.onmessage = (evt) => {
    const now = Date.now();
    if (now - lastP < 20) return; lastP = now;
    try {
      processMessage(JSON.parse(evt.data));
      frameCount++;
      if (now - lastFpsTime > 1000) {
        document.getElementById('fps').textContent = frameCount + ' fps';
        frameCount = 0; lastFpsTime = now;
      }
    } catch(e) {}
  };
}
connect();
